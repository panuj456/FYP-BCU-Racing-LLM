version: '3'

services:
  telemetry-app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama-server:11434
    depends_on:
      - ollama-server

  ollama-server:
    image: ollama/ollama
    volumes:
      - ./ollama_data:/root/.ollama
    ports:
      - "11434:11434"